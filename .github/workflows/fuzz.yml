name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Splits the
# 30-minute total budget across the 2 targets (~15 min each). The
# `ffmpeg_oracle_decode` harness dlopens libavcodec at runtime via
# libloading; the CI runner needs the `ffmpeg` package (which pulls
# the libavcodec shared library) installed so the oracle actually
# validates instead of silently skipping.

on:
  schedule:
    - cron: "37 6 * * *"   # daily 06:37 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      extra_packages_apt: "ffmpeg"
      time_budget_seconds: 1800
    secrets: inherit
